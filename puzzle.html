<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Puzzle - Blink Games</title>
  <link rel="stylesheet" href="styles.css?v=1782403755244">
  <script src="script.js?v=1782403755244" defer></script>
  <style>
    .puzzle-container {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3rem;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
    }
    .puzzle-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2px;
      background: var(--glass-border);
      width: 100%;
      aspect-ratio: 1;
      margin-top: 2rem;
      border: 4px solid var(--bp-pink);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 42, 133, 0.5);
    }
    .tile {
      width: 100%;
      height: 100%;
      background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Blackpink_PUBG_210321.jpg?width=600');
      background-size: 300% 300%;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .tile:hover {
      opacity: 0.8;
    }
    .tile.empty {
      background: none;
      background-color: var(--bg-dark);
      cursor: default;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--bp-pink);
    }
    #puzzle-result {
      display: none;
      margin-top: 2rem;
      font-size: 1.5rem;
      color: #00ff88;
      font-weight: bold;
    }
  </style>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">BLACKPINK</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>

  <!-- Page Transition Overlay -->
  <div id="page-transition"></div>

  <!-- Lightstick Canvas Background -->
  <canvas id="lightstick-canvas"></canvas>

  <!-- Era Toggle Button -->
  <button id="era-toggle-btn" onclick="cycleEra()">&#x1F5A4; Original</button>

  <header class="hero" style="height: 30vh; background: radial-gradient(circle at center, var(--glass-border), transparent);">
    <div class="hero-content">
      <h1 style="font-size: 3.5rem;">Photo Puzzle</h1>
    </div>
  </header>

  <main class="container">
    <div class="text-center" style="margin-bottom: 2rem;">
      <a href="games.html?v=1782403788303" class="btn btn-glow">&larr; Back to Hub</a>
    </div>

    <div class="puzzle-container">
      <h2 style="margin-bottom: 1rem;">Slide the Tiles!</h2>
      <p style="color: #ccc;">Rearrange the tiles to complete the Blackpink group photo in the fewest moves!</p>
      
      <div class="stats">
        <span>Moves: <span id="move-count">0</span></span>
        <button class="btn primary" style="padding: 0.5rem 1rem;" onclick="initPuzzle()">Restart</button>
      </div>

      <div class="puzzle-board" id="board">
        <!-- Tiles generated by JS -->
      </div>

      <div id="puzzle-result">
        <p>🎉 Puzzle Completed in <span id="final-moves"></span> moves!</p>
        <p id="puzzle-leaderboard-msg" style="color: var(--bp-pink); font-size: 1rem; margin-top: 1rem;"></p>
        <a href="leaderboard.html?v=1782403788303" class="btn btn-glow" style="margin-top: 1.5rem;">View Leaderboard</a>
      </div>
    </div>
  </main>

  <footer>
    <p>Created with �x by <a href="https://github.com/HemantTheCoder" target="_blank">Hemant</a></p>
  </footer>


  <!-- Back to Top -->
  <button id="back-to-top" aria-label="Back to top">&#8593;</button>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- YouTube Music Player Widget -->
  <div id="music-player">
    <div class="player-toggle" onclick="toggleMusicPlayer()">
      <span class="player-toggle-label">&#127925; BLACKPINK Music</span>
      <span id="player-toggle-icon">&#9660;</span>
    </div>
    <div id="player-body">
      <div class="player-track-info">
        <div class="player-track-title" id="yt-track-name">Whistle</div>
        <div class="player-track-artist" id="yt-track-artist">BLACKPINK</div>
      </div>
      <div id="yt-player-container">
        <div id="yt-player"></div>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" id="yt-shuffle-btn" onclick="ytShuffle()" title="Shuffle">&#128256;</button>
        <button class="ctrl-btn" onclick="ytPrev()" title="Previous">&#9198;</button>
        <button class="ctrl-btn play-pause" id="yt-play-btn" onclick="ytPlayPause()" title="Play/Pause">&#9654;</button>
        <button class="ctrl-btn" onclick="ytNext()" title="Next">&#9197;</button>
      </div>
      <div class="player-tracklist" id="player-tracklist"></div>
    </div>
  </div>
</body>
</html>
