<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Puzzle - Blink Games</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
  <style>
    .puzzle-container {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3rem;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
    }
    .puzzle-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2px;
      background: var(--glass-border);
      width: 100%;
      aspect-ratio: 1;
      margin-top: 2rem;
      border: 4px solid var(--bp-pink);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 42, 133, 0.5);
    }
    .tile {
      width: 100%;
      height: 100%;
      background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Blackpink_PUBG_210321.jpg?width=600');
      background-size: 300% 300%;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .tile:hover {
      opacity: 0.8;
    }
    .tile.empty {
      background: none;
      background-color: var(--bg-dark);
      cursor: default;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--bp-pink);
    }
    #puzzle-result {
      display: none;
      margin-top: 2rem;
      font-size: 1.5rem;
      color: #00ff88;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header class="hero" style="height: 30vh; background: radial-gradient(circle at center, var(--glass-border), transparent);">
    <div class="hero-content">
      <h1 style="font-size: 3.5rem;">Photo Puzzle</h1>
    </div>
  </header>

  <main class="container">
    <div class="text-center" style="margin-bottom: 2rem;">
      <a href="games.html" class="btn btn-glow">&larr; Back to Hub</a>
    </div>

    <div class="puzzle-container">
      <h2 style="margin-bottom: 1rem;">Slide the Tiles!</h2>
      <p style="color: #ccc;">Rearrange the tiles to complete the Blackpink group photo in the fewest moves!</p>
      
      <div class="stats">
        <span>Moves: <span id="move-count">0</span></span>
        <button class="btn primary" style="padding: 0.5rem 1rem;" onclick="initPuzzle()">Restart</button>
      </div>

      <div class="puzzle-board" id="board">
        <!-- Tiles generated by JS -->
      </div>

      <div id="puzzle-result">
        <p>🎉 Puzzle Completed in <span id="final-moves"></span> moves!</p>
        <p id="puzzle-leaderboard-msg" style="color: var(--bp-pink); font-size: 1rem; margin-top: 1rem;"></p>
        <a href="leaderboard.html" class="btn btn-glow" style="margin-top: 1.5rem;">View Leaderboard</a>
      </div>
    </div>
  </main>

  <footer>
    <p>Created with 💖 by <a href="https://github.com/HemantTheCoder" target="_blank">Hemant</a></p>
  </footer>

  <script>
    let moves = 0;
    let tiles = [];
    const size = 3;
    let emptyIdx = 8;
    let isComplete = false;

    // 0 to 8 representing the correct positions
    function initPuzzle() {
      moves = 0;
      isComplete = false;
      document.getElementById('move-count').textContent = moves;
      document.getElementById('puzzle-result').style.display = 'none';
      
      // Create solved array
      tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8];
      
      // Shuffle reliably by performing valid random moves backwards
      emptyIdx = 8;
      for(let i=0; i<150; i++) {
        let validMoves = getValidMoves(emptyIdx);
        let randomMove = validMoves[Math.floor(Math.random() * validMoves.length)];
        swap(emptyIdx, randomMove, false);
      }
      
      renderBoard();
    }

    function getValidMoves(idx) {
      const valid = [];
      const row = Math.floor(idx / size);
      const col = idx % size;
      if(row > 0) valid.push(idx - size); // Up
      if(row < size - 1) valid.push(idx + size); // Down
      if(col > 0) valid.push(idx - 1); // Left
      if(col < size - 1) valid.push(idx + 1); // Right
      return valid;
    }

    function swap(i, j, animate=true) {
      let temp = tiles[i];
      tiles[i] = tiles[j];
      tiles[j] = temp;
      if (tiles[i] === 8) emptyIdx = i;
      if (tiles[j] === 8) emptyIdx = j;
      if (animate) {
        moves++;
        document.getElementById('move-count').textContent = moves;
        renderBoard();
        checkWin();
      }
    }

    function renderBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      
      tiles.forEach((val, idx) => {
        const div = document.createElement('div');
        div.className = 'tile';
        if (val === 8) {
          div.classList.add('empty');
        } else {
          // Calculate background position
          const row = Math.floor(val / size);
          const col = val % size;
          div.style.backgroundPosition = `${col * 50}% ${row * 50}%`;
          div.onclick = () => handleTileClick(idx);
        }
        board.appendChild(div);
      });
    }

    function handleTileClick(idx) {
      if(isComplete) return;
      const validMoves = getValidMoves(emptyIdx);
      if(validMoves.includes(idx)) {
        swap(emptyIdx, idx);
      }
    }

    function checkWin() {
      for(let i=0; i<8; i++) {
        if(tiles[i] !== i) return;
      }
      isComplete = true;
      document.getElementById('board').children[8].classList.remove('empty');
      document.getElementById('board').children[8].style.backgroundPosition = `100% 100%`;
      document.getElementById('puzzle-result').style.display = 'block';
      document.getElementById('final-moves').textContent = moves;
      
      // Save Leaderboard
      const bestScore = localStorage.getItem('puzzleBestMoves');
      const msgEl = document.getElementById('puzzle-leaderboard-msg');
      if (!bestScore || moves < parseInt(bestScore)) {
        localStorage.setItem('puzzleBestMoves', moves);
        msgEl.textContent = "🏆 New Best Score! (Fewest Moves)";
      } else {
        msgEl.textContent = "Great job! Try to beat your record next time.";
      }
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', initPuzzle);
  </script>
</body>
</html>
