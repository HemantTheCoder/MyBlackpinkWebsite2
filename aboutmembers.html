<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackpink Members</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>

  <header class="hero" style="height: 30vh; background: radial-gradient(circle at center, var(--glass-border), transparent);">
    <div class="hero-content">
      <h1 style="font-size: 4rem;">The Members</h1>
    </div>
  </header>

  <main class="container">
    <div class="text-center">
      <a href="index.html" class="btn btn-glow" style="margin-bottom: 2rem;">&larr; Back to Home</a>
    </div>

    <section class="glass-card" style="padding: 4rem;">
      <h2 style="margin-bottom: 1rem; font-size: 3rem;">Meet Blackpink</h2>
      <p style="text-align: center; color: #aaa; margin-bottom: 3rem; font-size: 1.2rem;">Select a member to explore their individual profile and solo achievements.</p>
      
      <div class="members-grid">
        <a href="Jisoo.html" class="glass-card member-card">
          <div class="member-card-img-wrapper">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Jisoo_from_BLACKPINK_PUBG_210321_(cropped).jpg?width=400" alt="Jisoo">
          </div>
          <h3>Jisoo</h3>
          <p>Lead Vocalist, Visual</p>
        </a>

        <a href="Jennie.html" class="glass-card member-card">
          <div class="member-card-img-wrapper">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Jennie_Kim_from_BLACKPINK_PUBG_210321_(cropped).jpg?width=400" alt="Jennie">
          </div>
          <h3>Jennie</h3>
          <p>Main Rapper, Lead Vocalist</p>
        </a>

        <a href="RoséSolo.html" class="glass-card member-card">
          <div class="member-card-img-wrapper">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Blackpink_Rosé_Rimowa_1.jpg?width=400" alt="Rosé">
          </div>
          <h3>Rosé</h3>
          <p>Main Vocalist, Lead Dancer</p>
        </a>

        <a href="Lalisa.html" class="glass-card member-card">
          <div class="member-card-img-wrapper">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/20240314_Lisa_Manoban_07.jpg?width=400" alt="Lisa">
          </div>
          <h3>Lisa</h3>
          <p>Main Dancer, Lead Rapper</p>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <p>Created with 💖 by <a href="https://github.com/HemantTheCoder" target="_blank">Hemant</a></p>
  </footer>

  <!-- Spotify Music Player Widget -->
  <div id="music-player" style="padding: 0; background: transparent; border: none; box-shadow: none;">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/artist/41MozSoPIsD1dJM0CLPjZF?utm_source=generator&theme=0" width="300" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

</body>
</html>
