<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackpink Members</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
  <style>
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    .member-card {
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .member-card:hover {
      transform: translateY(-10px);
    }
    .member-card img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--bp-pink);
      margin-bottom: 1rem;
      box-shadow: 0 10px 20px rgba(255, 102, 178, 0.3);
      transition: transform 0.3s ease;
    }
    .member-card:hover img {
      transform: scale(1.05);
    }
    .member-card h3 {
      font-size: 1.8rem;
      color: var(--bp-pink);
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

  <header class="hero" style="height: 40vh; background-image: url('blackpinkgroup.jpg');">
    <div class="hero-content">
      <h1>The Members</h1>
    </div>
  </header>

  <main class="container">
    <div class="text-center">
      <a href="index.html" class="btn primary" style="margin-bottom: 2rem;">Back to Home</a>
    </div>

    <section class="glass-card">
      <h2 style="margin-bottom: 2rem;">Meet Blackpink</h2>
      
      <div class="members-grid">
        <a href="Jisoo.html" class="glass-card member-card">
          <img src="Jisoo.webp" alt="Jisoo">
          <h3>Jisoo</h3>
          <p>Lead Vocalist, Visual</p>
        </a>

        <a href="Jennie.html" class="glass-card member-card">
          <img src="Jennie.webp" alt="Jennie">
          <h3>Jennie</h3>
          <p>Main Rapper, Lead Vocalist</p>
        </a>

        <a href="RoséSolo.html" class="glass-card member-card">
          <img src="Rose.webp" alt="Rosé">
          <h3>Rosé</h3>
          <p>Main Vocalist, Lead Dancer</p>
        </a>

        <a href="Lalisa.html" class="glass-card member-card">
          <img src="Lisa.webp" alt="Lisa">
          <h3>Lisa</h3>
          <p>Main Dancer, Lead Rapper</p>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <p>Created with 💖 by <a href="https://github.com/HemantTheCoder" target="_blank">Hemant</a></p>
  </footer>

  <!-- Spotify Music Player Widget -->
  <div id="music-player" style="padding: 0; background: transparent; border: none; box-shadow: none;">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/artist/41MozSoPIsD1dJM0CLPjZF?utm_source=generator&theme=0" width="300" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

</body>
</html>
