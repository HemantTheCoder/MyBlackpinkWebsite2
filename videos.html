<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latest Videos - Blackpink</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
  <style>
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    .video-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .video-card iframe {
      width: 100%;
      height: 250px;
      border: none;
    }
    .video-info {
      padding: 1rem;
      text-align: center;
    }
    .video-info h3 {
      font-size: 1.1rem;
      color: var(--text-main);
      margin-bottom: 0;
    }
  </style>
</head>
<body>

  <header class="hero" style="height: 30vh; background-image: url('blackpinkgroup.jpg');">
    <div class="hero-content">
      <h1>Latest Videos</h1>
    </div>
  </header>

  <main class="container">
    <div class="text-center" style="margin-bottom: 2rem;">
      <a href="index.html" class="btn primary">Back to Home</a>
    </div>

    <section>
      <h2 class="text-center">Recent Music Videos</h2>
      
      <div class="video-grid">
        <!-- Pink Venom -->
        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/gQlMMD8auMs" allowfullscreen></iframe>
          <div class="video-info">
            <h3>BLACKPINK - 'Pink Venom' M/V</h3>
          </div>
        </div>

        <!-- Shut Down -->
        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/POe9SOEKotk" allowfullscreen></iframe>
          <div class="video-info">
            <h3>BLACKPINK - 'Shut Down' M/V</h3>
          </div>
        </div>

        <!-- Flower (Jisoo) -->
        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/YudHcBIxlYw" allowfullscreen></iframe>
          <div class="video-info">
            <h3>JISOO - '꽃(FLOWER)' M/V</h3>
          </div>
        </div>

        <!-- You & Me (Jennie) -->
        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/e1xXgoJuD_o" allowfullscreen></iframe>
          <div class="video-info">
            <h3>JENNIE - 'You & Me' DANCE PERFORMANCE</h3>
          </div>
        </div>
        
        <!-- Lovesick Girls -->
        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/dyRsYk0LyA8" allowfullscreen></iframe>
          <div class="video-info">
            <h3>BLACKPINK - 'Lovesick Girls' M/V</h3>
          </div>
        </div>

        <!-- How You Like That -->
        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/ioNng23DkIM" allowfullscreen></iframe>
          <div class="video-info">
            <h3>BLACKPINK - 'How You Like That' M/V</h3>
          </div>
        </div>
      </div>

      <div class="text-center" style="margin-top: 3rem;">
        <a href="https://www.youtube.com/c/BLACKPINKOFFICIAL" class="btn primary" target="_blank">View All on Official Channel</a>
      </div>
    </section>

  </main>

  <footer>
    <p>Created with 💖 by <a href="https://github.com/HemantTheCoder" target="_blank">Hemant</a></p>
  </footer>

  <!-- Spotify Music Player Widget -->
  <div id="music-player" style="padding: 0; background: transparent; border: none; box-shadow: none;">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX11Rj90I3B11?utm_source=generator&theme=0" width="300" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

</body>
</html>
