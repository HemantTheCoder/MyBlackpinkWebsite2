<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photocard Gacha | Blackpink</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    .gacha-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      margin-top: 2rem;
    }
    .pack-img {
      width: 250px;
      cursor: pointer;
      transition: all 0.3s;
      filter: drop-shadow(0 0 15px var(--bp-pink));
      animation: floatUp 3s infinite ease-in-out alternate;
    }
    .pack-img:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 0 25px var(--bp-pink));
    }
    #card-reveal {
      display: none;
      margin-top: 2rem;
      text-align: center;
    }
    #card-reveal img {
      max-width: 300px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      border: 2px solid #fff;
    }
    .card-rarity {
      font-size: 1.5rem;
      font-weight: bold;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .card-rarity.common { color: #a0a0a0; }
    .card-rarity.rare { color: #4287f5; text-shadow: 0 0 10px #4287f5; }
    .card-rarity.epic { color: #b742f5; text-shadow: 0 0 15px #b742f5; }
    .card-rarity.legendary { color: #f5b942; text-shadow: 0 0 20px #f5b942; }

    .reveal-anim.legendary img {
      animation: legendaryGlow 2s infinite alternate;
    }
    @keyframes legendaryGlow {
      from { box-shadow: 0 0 20px #f5b942, inset 0 0 20px #f5b942; border-color: #f5b942; }
      to { box-shadow: 0 0 50px #f5b942, inset 0 0 50px #f5b942; border-color: #fff; }
    }
    
    /* Animation Styles */
    .card-pack {
      width: 200px;
      height: 300px;
      background: linear-gradient(135deg, var(--bp-pink), #ff6b9e);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(255, 138, 172, 0.5);
      border: 4px solid #fff;
      font-size: 3rem;
      font-weight: 900;
      color: #fff;
      margin: 0 auto;
      cursor: pointer;
    }
    .shake-anim {
      animation: shakePack 0.5s ease-in-out infinite;
    }
    @keyframes shakePack {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    .burst-anim {
      animation: packBurst 0.5s forwards;
    }
    @keyframes packBurst {
      0% { transform: scale(1); filter: brightness(1); opacity: 1; }
      50% { transform: scale(1.2); filter: brightness(2) drop-shadow(0 0 50px #fff); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    #card-reveal img {
      max-width: 300px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      border: 2px solid #fff;
      animation: flipIn 0.8s ease-out forwards;
      transform-style: preserve-3d;
      opacity: 0;
    }
    @keyframes flipIn {
      0% { transform: perspective(400px) rotateY(90deg); opacity: 0; }
      100% { transform: perspective(400px) rotateY(0deg); opacity: 1; }
    }
  </style>

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  
  <header class="hero">
    <div class="hero-content">
      <h1>🎴 Photocard Pull</h1>
      <p style="font-size: 1.2rem; font-weight: 300; margin-top: 0.5rem; position:relative; z-index:1;">Pull your daily random Blackpink photocard!</p>
    </div>
  </header>

  <main class="container">
    <div class="text-center" style="margin-bottom: 2rem;">
      <a href="index.html" class="btn">&larr; Back to Home</a>
      <a href="profile.html" class="btn">View My Collection &rarr;</a>
      <a href="trades.html" class="btn btn-outline" style="margin-left:1rem;">Global Trade Hub 🔄</a>
    </div>

    <div class="glass-card gacha-container">
      <h2>Your Daily Pull</h2>
      <p style="color: #ccc; margin-bottom: 2rem;">You can pull one random photocard every day. Rarities range from Common to Legendary!</p>
      
      <button id="pull-card-btn" class="btn btn-glow" style="font-size: 1.5rem; padding: 1rem 3rem;">PULL CARD 🎁</button>
      <div id="pull-countdown" style="display:none; margin-top: 1.5rem; color: #aaa; font-size: 1.2rem;"></div>

      <div id="pack-anim-container" style="display: none; margin-top: 2rem;">
        <div id="card-pack" class="card-pack">BP</div>
      </div>

      <div id="card-reveal">
        <h3 style="margin-bottom: 1rem; color: var(--bp-pink);">You Pulled:</h3>
        <img id="pulled-card-img" src="" alt="Pulled Photocard">
        <div id="pulled-card-rarity" class="card-rarity"></div>
      </div>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
