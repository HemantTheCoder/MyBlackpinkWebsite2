<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blink Wall | Blackpink</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="pages.css">
  <style>
    .wall-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .message-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 3rem;
    }
    
    .message-form input,
    .message-form select,
    .message-form textarea {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--bp-pink);
      border-radius: 10px;
      padding: 1rem;
      color: white;
      font-family: 'Outfit', sans-serif;
    }

    .message-form textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .messages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }
    
    .message-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      padding: 1.5rem;
      position: relative;
      transition: transform 0.3s;
    }
    
    .message-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px var(--bp-pink-glow);
    }
    
    .message-card.bias-jennie { border-top: 4px solid #4a90e2; }
    .message-card.bias-jisoo { border-top: 4px solid #e74c3c; }
    .message-card.bias-rose { border-top: 4px solid #f39c12; }
    .message-card.bias-lisa { border-top: 4px solid #f1c40f; }
    .message-card.bias-ot4 { border-top: 4px solid var(--bp-pink); }
    
    .msg-author {
      font-weight: 800;
      color: var(--bp-pink);
      margin-bottom: 0.5rem;
      font-size: 1.2rem;
    }
    
    .msg-content {
      font-size: 1rem;
      line-height: 1.4;
      margin-bottom: 1rem;
    }
    
    .msg-bias {
      position: absolute;
      bottom: 10px;
      right: 15px;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">BLACKPINK</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>

  <!-- Page Transition Overlay -->
  <div id="page-transition"></div>

  <!-- Lightstick Canvas Background -->
  <canvas id="lightstick-canvas"></canvas>

  <!-- Era Toggle Button -->
  <button id="era-toggle-btn" onclick="cycleEra()">&#x1F5A4; Original</button>

  <header class="hero" style="height: 30vh; background: radial-gradient(circle at center, var(--glass-border), transparent);">
    <div class="hero-content">
      <h1 style="font-size: 3.5rem;">Blink Wall</h1>
    </div>
  </header>

  <main class="wall-container">
    <div class="text-center" style="margin-bottom: 2rem;">
      <a href="index.html" class="btn">&larr; Back to Home</a>
    </div>
    
    <h1 style="text-align: center;">Global Blink Wall</h1>
    <p class="text-center" style="margin-bottom: 2rem;">Leave a message for Blackpink or other Blinks around the world!</p>
    
    <div class="glass-card">
      <form class="message-form" id="wall-form">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <input type="text" id="msg-name" placeholder="Your Name or Blink ID" required>
          <select id="msg-bias">
            <option value="OT4" style="color: black;">OT4 (All Members)</option>
            <option value="Jennie" style="color: black;">Jennie</option>
            <option value="Jisoo" style="color: black;">Jisoo</option>
            <option value="Rosé" style="color: black;">Rosé</option>
            <option value="Lisa" style="color: black;">Lisa</option>
          </select>
        </div>
        <textarea id="msg-text" placeholder="Write your message here..." required maxlength="250"></textarea>
        <button type="submit" class="btn btn-glow">Post Message</button>
      </form>
    </div>
    
    <div class="messages-grid" id="messages-grid">
      <p class="text-center">Loading messages...</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
